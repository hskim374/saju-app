<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무료사주 간단히 보기</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3984376475463185"
        crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f1ea;
            color: #222;
        }

        .container {
            max-width: 520px;
            margin: 48px auto;
            padding: 24px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            text-align: center;
        }

        p {
            color: #555;
            text-align: center;
            margin-bottom: 20px;
        }

        .error {
            margin-bottom: 20px;
            padding: 14px;
            border-radius: 10px;
            background: #fde8e4;
            color: #a33c20;
            font-size: 14px;
        }

        .radio-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .radio-row label,
        .check-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #d5d0c8;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .hint {
            margin-top: -8px;
            margin-bottom: 16px;
            color: #666;
            font-size: 13px;
            text-align: left;
        }

        .persist-note {
            margin-top: 12px;
            color: #666;
            font-size: 12px;
            text-align: center;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            background: #9c4f2f;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #7e3f25;
        }

        .secondary-button {
            background: #e6ddd2;
            color: #5b4636;
            box-shadow: none;
        }

        .secondary-button:hover {
            background: #d9cebf;
        }

        .ad-block {
            margin: 8px 0 10px;
            text-align: center;
        }

        .ad-block .adsbygoogle {
            display: inline-block !important;
            margin: 0 auto;
        }

        .affiliate-box {
            margin-top: 24px;
            width: 100%;
        }

        .affiliate-banner-slot {
            width: 100%;
        }

        .affiliate-note {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            text-align: left;
        }

        .saju_responsive_2 {
            width: 320px;
            height: 100px;
        }

        @media(min-width: 500px) {
            .saju_responsive_2 {
                width: 468px;
                height: 60px;
            }
        }

        @media(min-width: 800px) {
            .saju_responsive_2 {
                width: 728px;
                height: 90px;
            }
        }
    </style>
</head>

<body>
    <div class="ad-block">
        <ins class="adsbygoogle saju_responsive_2" style="display:block" data-ad-client="ca-pub-3984376475463185"
            data-ad-slot="6065156606"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    <div class="container">
        <h1>무료사주 간단히 보기</h1>
        <p>양력/음력과 출생시간을 입력하면 실제 절기 기준 사주 8자를 계산합니다.</p>

        {% if error_message %}
        <div class="error">{{ error_message }}</div>
        {% endif %}

        <form id="saju-form" action="/result" method="post">
            <label>달력 종류</label>
            <div class="radio-row">
                <label>
                    <input type="radio" name="calendar_type" value="solar" {% if form_data.calendar_type=="solar"
                        %}checked{% endif %}>
                    양력
                </label>
                <label>
                    <input type="radio" name="calendar_type" value="lunar" {% if form_data.calendar_type=="lunar"
                        %}checked{% endif %}>
                    음력
                </label>
            </div>

            <div class="check-row">
                <label>
                    <input type="checkbox" name="is_leap_month" {% if form_data.is_leap_month %}checked{% endif %}>
                    윤달 여부 (음력 입력일 때만 체크)
                </label>
            </div>

            <label for="year">출생년도</label>
            <select id="year" name="year" required>
                <option value="">출생년도를 선택하세요</option>
                {% for option_year in birth_year_options %}
                <option value="{{ option_year }}" {% if form_data.year|string == option_year|string %}selected{% endif %}>
                    {{ option_year }}년
                </option>
                {% endfor %}
            </select>

            <label for="month">출생월</label>
            <select id="month" name="month" required>
                <option value="">출생월을 선택하세요</option>
                {% for option_month in month_options %}
                <option value="{{ option_month }}" {% if form_data.month|string == option_month|string %}selected{% endif %}>
                    {{ option_month }}월
                </option>
                {% endfor %}
            </select>

            <label for="day">출생일</label>
            <select id="day" name="day" required>
                <option value="">출생일을 선택하세요</option>
                {% for option_day in day_options %}
                <option value="{{ option_day }}" {% if form_data.day|string == option_day|string %}selected{% endif %}>
                    {{ option_day }}일
                </option>
                {% endfor %}
            </select>

            <label for="time_slot">출생시간 구간</label>
            <select id="time_slot" name="time_slot">
                {% for slot in time_slots %}
                <option value="{{ slot.id }}" {% if form_data.time_slot==slot.id %}selected{% endif %}>{{ slot.label }}
                </option>
                {% endfor %}
            </select>
            <div class="hint">시간은 일반 시각 대신 구간으로 선택합니다. 자시는 00:00~00:59와 23:00~23:59 두 선택지가 모두 자시로 계산됩니다.</div>

            <label>성별 (대운/관계운 기준)</label>
            <div class="radio-row">
                <label>
                    <input type="radio" name="gender" value="male" {% if form_data.gender=="male" %}checked{% endif %}
                        required>
                    남성
                </label>
                <label>
                    <input type="radio" name="gender" value="female" {% if form_data.gender=="female" %}checked{% endif
                        %}>
                    여성
                </label>
            </div>
            <div class="hint">대운 방향과 관계운 기준이 달라지므로 성별 입력은 필수입니다.</div>

            <input type="hidden" name="target_year" value="{{ form_data.target_year }}">
            <input type="hidden" name="target_month" value="{{ form_data.target_month }}">
            <input type="hidden" name="target_date" value="{{ form_data.target_date }}">

            <div class="button-row">
                <button type="submit">사주 보기</button>
                <button type="button" id="clear-saved-form" class="secondary-button">입력 초기화</button>
            </div>
            <div class="persist-note">출생 정보와 성별은 이 브라우저에만 저장되어 다음 방문 때 자동으로 채워집니다.</div>
        </form>

        <div class="affiliate-box">
            <div class="affiliate-banner-slot"></div>
            <script src="https://ads-partners.coupang.com/g.js"></script>
            <script>
                (function () {
                    var bannerSlot = document.currentScript.previousElementSibling;
                    var bannerWidth = Math.max(320, Math.floor(bannerSlot.clientWidth || bannerSlot.parentElement.clientWidth || 350));
                    new PartnersCoupang.G({ "id": 933121, "trackingCode": "AF3819787", "subId": null, "template": "carousel", "width": String(bannerWidth), "height": "120" });
                })();
            </script>
            <p class="affiliate-note">쿠팡파트너스 활동을 통해 일정액의 수수료를 제공받습니다.</p>
        </div>
    </div>
    <script>
        (function () {
            const STORAGE_KEY = "saju_mvp_index_form_v1";
            const PERSIST_FIELD_NAMES = [
                "calendar_type",
                "is_leap_month",
                "year",
                "month",
                "day",
                "time_slot",
                "gender"
            ];
            const form = document.getElementById("saju-form");
            const clearButton = document.getElementById("clear-saved-form");

            if (!form) {
                return;
            }

            function getFieldValue(field) {
                if (field.type === "checkbox") {
                    return field.checked;
                }
                if (field.type === "radio") {
                    return field.checked ? field.value : null;
                }
                return field.value;
            }

            function collectFormState() {
                const state = {};

                PERSIST_FIELD_NAMES.forEach((name) => {
                    const fields = form.querySelectorAll(`[name="${name}"]`);
                    if (!fields.length) {
                        return;
                    }

                    const firstField = fields[0];
                    if (firstField.type === "radio") {
                        const checkedField = Array.from(fields).find((field) => field.checked);
                        state[name] = checkedField ? checkedField.value : "";
                        return;
                    }

                    state[name] = getFieldValue(firstField);
                });

                return state;
            }

            function saveFormState() {
                try {
                    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(collectFormState()));
                } catch (error) {
                    console.warn("입력값 자동 저장에 실패했습니다.", error);
                }
            }

            function applySavedState() {
                try {
                    const raw = window.localStorage.getItem(STORAGE_KEY);
                    if (!raw) {
                        return;
                    }

                    const savedState = JSON.parse(raw);
                    PERSIST_FIELD_NAMES.forEach((name) => {
                        const fields = form.querySelectorAll(`[name="${name}"]`);
                        if (!fields.length || !(name in savedState)) {
                            return;
                        }

                        const firstField = fields[0];
                        if (firstField.type === "radio") {
                            Array.from(fields).forEach((field) => {
                                field.checked = field.value === savedState[name];
                            });
                            return;
                        }

                        if (firstField.type === "checkbox") {
                            firstField.checked = Boolean(savedState[name]);
                            return;
                        }

                        if (savedState[name] !== "" && savedState[name] !== null && savedState[name] !== undefined) {
                            firstField.value = String(savedState[name]);
                        }
                    });
                } catch (error) {
                    console.warn("저장된 입력값 복원에 실패했습니다.", error);
                }
            }

            function clearSavedState() {
                try {
                    window.localStorage.removeItem(STORAGE_KEY);
                } catch (error) {
                    console.warn("저장된 입력값 삭제에 실패했습니다.", error);
                }

                form.reset();
            }

            applySavedState();

            form.addEventListener("change", saveFormState);
            form.addEventListener("submit", saveFormState);

            if (clearButton) {
                clearButton.addEventListener("click", clearSavedState);
            }
        })();
    </script>
</body>

</html>
